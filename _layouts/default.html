<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
    }
    img {
      max-width: 100%;
      height: auto;
    }
    a {
      color: #0366d6;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    h1, h2, h3 { color: #1a1a1a; }
    code {
      background: #f6f8fa;
      padding: 2px 6px;
      border-radius: 3px;
    }
    pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
    }
    .container {
      background: #fff;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p><a href="{{ '/' | relative_url }}">← 首页</a></p>
    {{ content }}
  </div>
</body>
</html>
